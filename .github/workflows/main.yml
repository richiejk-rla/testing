
name: Ping Supabase – Diagnostic

on:
  workflow_dispatch:  # Allows manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Debug keys (safe)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          echo "URL: ${SUPABASE_URL}"
          echo "ANON length: ${#SUPABASE_ANON_KEY}"
          echo "ANON prefix: ${SUPABASE_ANON_KEY:0:8}..."
          if [ -z "${SUPABASE_URL}" ]; then
            echo "Missing SUPABASE_URL secret"; exit 1
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing SUPABASE_ANON_KEY secret"; exit 1
          fi

      - name: Ping Supabase REST endpoint (diagnostic)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TABLE: ping_health   # Change if you use a different table
        run: |
          set -Eeuo pipefail

          URL="${SUPABASE_URL}/rest/v1/${TABLE}?select=id&limit=1"
          echo "Hitting: $URL"
          echo "Headers: apikey + bearer (anon key)"
          
          STATUS=$(curl -sS -D /tmp/headers.txt -o /tmp/body.txt -w "%{http_code}" \
            "$URL" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --max-time 20)

          echo "HTTP status: $STATUS"
          echo "Response headers (first 80 lines):"
          sed -n '1,80p' /tmp/headers.txt || true
          
          echo "Response body (first 2KB):"
          head -c 2048 /tmp/body.txt || true
          echo

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Ping OK"
          else
            echo "Ping failed with HTTP $STATUS"
            # Helpful hints for common statuses
            if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "Tip: Verify you're using the anon key, and that the table has a policy allowing anon to SELECT."
            elif [ "$STATUS" = "404" ]; then
              echo "Tip: Check the table name (${TABLE}) exists and is exposed via PostgREST."
            fi
            exit 1
          fi
