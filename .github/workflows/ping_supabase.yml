
name: Ping Supabase to Prevent Pausing

on:
  workflow_dispatch:            # allows manual runs from the actions tab
  schedule:
    - cron: '0 9 * * 1,4'       # 09:00 utc monday & thursday (update if needed)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}          # e.g., https://xxxxx.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}# use anon key, not service_role
        run: |
          set -euo pipefail
          # try up to 3 times in case of transient network glitches
          for i in 1 2 3; do
            status=$(curl -sS --max-time 15 -o /dev/null -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/your_table?select=id&limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
            if [ "$status" = "200" ]; then
              echo "ping ok (http $status)"
              exit 0
            else
              echo "attempt $i failed (http $status). retrying..."
              sleep 5
            fi
          done
          echo "ping failed after retries"
          exit 1
